<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}ApartmentFinder{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen flex flex-col">
  <header class="border-b border-slate-200 bg-white">
    <div class="mx-auto max-w-6xl px-4 py-4 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2.5 group">
        <span class="inline-flex h-8 w-8 items-center justify-center rounded-lg bg-blue-600 text-white font-bold text-sm">AF</span>
        <span class="leading-tight">
          <span class="block font-semibold text-slate-900 group-hover:text-blue-700 transition-colors">ApartmentFinder</span>
          <span class="block text-xs text-slate-400 -mt-0.5">Edmonton rentals</span>
        </span>
      </a>
      <nav class="flex items-center gap-4">
        <a href="/searches" class="inline-flex items-center gap-1 text-sm font-medium text-slate-600 hover:text-slate-900">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          Searches
        </a>
        <a href="/favorites" class="text-sm font-medium text-rose-600 hover:text-rose-700">♥ Saved</a>
        <a href="/settings" class="inline-flex items-center gap-1 text-sm font-medium text-slate-600 hover:text-slate-900" title="Settings">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Settings
        </a>
      </nav>
    </div>
  </header>
  <main class="flex-1 mx-auto w-full max-w-6xl px-4 py-8">
    {% block content %}{% endblock %}
  </main>
  <footer class="border-t border-slate-200 bg-white">
    <div class="mx-auto max-w-6xl px-4 py-4 text-xs text-slate-400">
      Aggregates RentFaster · Rentals.ca · Zumper · Kijiji · RentCanada. Personal use.
    </div>
  </footer>

  <script>
  // Global delegated handlers shared by results + favorites pages:
  // save/unsave hearts, lazy phone lookup, and the contact-panel toggle.
  document.addEventListener('click', async (e) => {
    const fav = e.target.closest('.fav-btn');
    if (fav) {
      const id = fav.dataset.id;
      fav.disabled = true;
      try {
        const r = await fetch('/api/favorites/toggle', { method: 'POST', body: new URLSearchParams({ id }) });
        const data = await r.json();
        const on = !!data.favorited;
        document.querySelectorAll('.fav-btn[data-id="' + (window.CSS && CSS.escape ? CSS.escape(id) : id) + '"]').forEach(b => {
          b.textContent = on ? '♥' : '♡';
          b.setAttribute('aria-pressed', on ? 'true' : 'false');
          b.title = on ? 'Saved — click to remove' : 'Save listing';
          b.classList.toggle('text-rose-500', on);
          b.classList.toggle('text-slate-300', !on);
          b.classList.toggle('hover:text-rose-400', !on);
        });
        if (!on && document.body.dataset.page === 'favorites') {
          const c = fav.closest('.listing-card, .listing-row');
          if (c) c.remove();
        }
      } catch (_) {} finally { fav.disabled = false; }
      return;
    }
    const pf = e.target.closest('.phone-fetch');
    if (pf) {
      // Lazily resolve a listing's number. On a hit the endpoint returns the contact
      // panel (popover): drop it in next to the button and turn the button into a
      // normal Contact toggle. On a miss it returns a link-out, which replaces the
      // button outright.
      const id = pf.dataset.id;
      const align = pf.dataset.align || 'left';
      const orig = pf.textContent;
      pf.disabled = true;
      pf.textContent = 'Loading…';
      try {
        const r = await fetch('/api/listings/' + encodeURIComponent(id) + '/phone?align=' + align);
        if (!r.ok) throw new Error('lookup failed');
        const html = await r.text();
        if (html.indexOf('contact-panel') !== -1) {
          pf.insertAdjacentHTML('afterend', html);  // popover (shown) becomes next sibling
          pf.classList.remove('phone-fetch');
          pf.classList.add('contact-toggle');
          pf.textContent = 'Contact';
          pf.setAttribute('aria-expanded', 'true');
          pf.disabled = false;
        } else {
          pf.outerHTML = html;  // no number — link-out fallback
        }
      } catch (_) {
        pf.textContent = orig;
        pf.disabled = false;
      }
      return;
    }
    const toggle = e.target.closest('.contact-toggle');
    if (toggle) {
      const panel = toggle.nextElementSibling;
      const open = panel.classList.toggle('hidden') === false;
      toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
      return;
    }
  });
  </script>
</body>
</html>
